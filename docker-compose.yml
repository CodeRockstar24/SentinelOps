services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    image: python:3.12-slim
    working_dir: /workspace/services/api
    volumes:
      - .:/workspace
    environment:
      ENVIRONMENT: development
      API_SERVICE_NAME: SentinelOps API
      API_VERSION: 0.1.0
      DATABASE_URL: sqlite:////workspace/services/api/data/sentinelops.db
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000
      TELEMETRY_STREAM_NAME: telemetry:events
      TELEMETRY_STREAM_MAXLEN: 500
      TELEMETRY_PRODUCER_ENABLED: true
      TELEMETRY_PRODUCER_INTERVAL_SECONDS: 1.0
      INCIDENT_DETECTOR_ENABLED: true
      LLM_PROVIDER: gemini
      GEMINI_MODEL: gemini-2.5-flash
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      - redis

  web:
    image: node:22-alpine
    working_dir: /workspace/apps/web
    volumes:
      - .:/workspace
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    depends_on:
      - api
